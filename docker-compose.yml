services:
  db:
    image: postgres:15
    container_name: securetaskapi-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: securetaskapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: securetaskapi-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
